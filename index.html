<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive of Flash Games — Under Construction</title>

  <!-- Ruffle: open-source Flash Player emulator (WebAssembly). Loaded from CDN. -->
  <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@latest/ruffle.js"></script>

  <style>
    :root {
      --player-border: #c81414;   /* red frame */
      --player-bg:     #141b2e;    /* dark navy screen */
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- Main stage: holds the player (center) + character (lower-left) ---- */
    .stage {
      position: relative;
      width: 100%;
      max-width: 1100px;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    /* ===================== FLASH GAME PLAYER ===================== */
    .player-frame {
      width: 565px;
      max-width: 90vw;
      aspect-ratio: 4 / 3;
      border: 10px solid var(--player-border);
      background: var(--player-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ruffle injects its own element here; this fills the frame */
    #game-player,
    #game-player ruffle-player,
    #game-player ruffle-embed {
      width: 100%;
      height: 100%;
      display: block;
    }

    .player-status {
      position: absolute;
      color: #6b7280;
      font-size: 15px;
      letter-spacing: 0.5px;
      pointer-events: none;
      text-align: center;
      padding: 0 20px;
    }

    .player-status.hidden { display: none; }

    /* small "another game" button under the frame */
    .reroll {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: var(--player-border);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.9;
    }
    .reroll:hover { opacity: 1; }

    /* ============ CHARACTER + SPEECH BUBBLE (lower-left) ============ */
    .character-group {
      position: absolute;
      left: 0;
      bottom: 40px;
      width: 280px;
      /* keep it from overlapping the player on narrow screens */
    }

    /* ---- SPEECH BUBBLE (edit the text inside) ---- */
    .speech-bubble {
      position: relative;
      background: #fff;
      border: 3px solid #000;
      border-radius: 24px;
      padding: 16px 20px;
      font-weight: 700;
      font-size: 17px;
      line-height: 1.3;
      max-width: 240px;
    }
    /* bubble tail */
    .speech-bubble::after {
      content: "";
      position: absolute;
      left: 150px;
      bottom: -26px;
      border-width: 28px 22px 0 0;
      border-style: solid;
      border-color: #000 transparent transparent transparent;
    }
    .speech-bubble::before {
      content: "";
      position: absolute;
      left: 150px;
      bottom: -20px;
      border-width: 22px 17px 0 0;
      border-style: solid;
      border-color: #fff transparent transparent transparent;
      z-index: 1;
    }

    /* ---- CHARACTER IMAGE (drop your cartoon pic here) ---- */
    .character {
      margin-top: 24px;
      margin-left: 120px;
      width: 170px;
      height: 170px;
      /* placeholder styling — remove once you add a real image */
      border: 2px dashed #bbb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 12px;
      text-align: center;
    }
    .character img { max-width: 100%; max-height: 100%; display: block; }

    @media (max-width: 820px) {
      .character-group { position: static; width: auto; margin-top: 30px; }
      .stage { flex-direction: column-reverse; align-items: center; gap: 24px; }
    }
  </style>
</head>

<body>
  <main class="stage">

    <!-- ============================================================
         FLASH GAME PLAYER
         A random game from the archive loads here on every page open.
         ============================================================ -->
    <section class="player-frame">
      <div id="game-player"></div>
      <div class="player-status" id="player-status">loading flash game…</div>
      <button class="reroll" id="reroll" title="Load another random game">🎲 another game</button>
    </section>

    <!-- ============================================================
         CHARACTER + SPEECH BUBBLE  (lower-left, like the mockup)
         👉 EDIT the bubble text below.
         👉 REPLACE the .character placeholder with your cartoon <img>.
         ============================================================ -->
    <div class="character-group">

      <!-- ▼▼▼ SPEECH BUBBLE TEXT — edit this ▼▼▼ -->
      <div class="speech-bubble" id="speech-bubble">
        The website is under construction! Play a flash game while waiting…
      </div>
      <!-- ▲▲▲ SPEECH BUBBLE TEXT ▲▲▲ -->

      <!-- ▼▼▼ CARTOON CHARACTER — replace placeholder with your image ▼▼▼ -->
      <div class="character">
        <img src="image/box_default.png" alt="mascot">
      </div>
      <!-- ▲▲▲ CARTOON CHARACTER ▲▲▲ -->

    </div>
  </main>

  <script>
    /* =========================================================
       RANDOM FLASH GAME LOADER
       Games are SWF files served from public GitHub archives via
       the jsDelivr CDN (CORS-enabled, so the browser can fetch them).
       Add/remove entries freely — { name, url }.
       ========================================================= */
    const GAMES = [
      { name: "Mutilate-a-Doll",  url: "https://cdn.jsdelivr.net/gh/HamsterThatCommitsStuff/SWF-Archive@master/mutilateadoll.swf" },
      { name: "Reach the Core",   url: "https://cdn.jsdelivr.net/gh/HamsterThatCommitsStuff/SWF-Archive@master/reachthecore.swf" },
      { name: "Terrasavr",        url: "https://cdn.jsdelivr.net/gh/HamsterThatCommitsStuff/SWF-Archive@master/terrasavr.swf" },
      { name: "Papa's Bakeria",   url: "https://cdn.jsdelivr.net/gh/HamsterThatCommitsStuff/SWF-Archive@master/papasbakeria_101.swf" },
      { name: "Papa's Cheeseria", url: "https://cdn.jsdelivr.net/gh/HamsterThatCommitsStuff/SWF-Archive@master/papascheeseria_102.swf" },
      { name: "Papa's Donuteria", url: "https://cdn.jsdelivr.net/gh/HamsterThatCommitsStuff/SWF-Archive@master/papasdonuteria_102.swf" },
      { name: "Papa's Pastaria",  url: "https://cdn.jsdelivr.net/gh/HamsterThatCommitsStuff/SWF-Archive@master/papaspastaria_v2.swf" },
      { name: "Papa's Scooperia", url: "https://cdn.jsdelivr.net/gh/HamsterThatCommitsStuff/SWF-Archive@master/papasscooperia_v102.swf" },
      { name: "Papa's Sushiria",  url: "https://cdn.jsdelivr.net/gh/HamsterThatCommitsStuff/SWF-Archive@master/papassushiria_101.swf" },
      { name: "Rumble",           url: "https://cdn.jsdelivr.net/gh/Noagi6493/FlashGamesArchive@main/Rumble_Newgrounds.swf" },
    ];

    const statusEl = document.getElementById("player-status");
    const container = document.getElementById("game-player");
    let player = null;

    function pickRandom() {
      return GAMES[Math.floor(Math.random() * GAMES.length)];
    }

    function loadGame(game) {
      statusEl.textContent = "loading " + game.name + "…";
      statusEl.classList.remove("hidden");

      const ruffle = window.RufflePlayer.newest();
      // fresh player each time so re-rolls start clean
      container.innerHTML = "";
      player = ruffle.createPlayer();
      container.appendChild(player);

      player.addEventListener("loadedmetadata", () => statusEl.classList.add("hidden"));

      player.load({
        url: game.url,
        autoplay: "on",
        unmuteOverlay: "visible",
        // games are designed for a fixed stage; let Ruffle scale to the frame
        scale: "showAll",
      }).then(() => {
        statusEl.classList.add("hidden");
      }).catch((err) => {
        console.error(err);
        statusEl.classList.remove("hidden");
        statusEl.textContent = "couldn't load " + game.name + " — try another game 🎲";
      });
    }

    // Ruffle installs window.RufflePlayer asynchronously after its script loads.
    function whenRuffleReady(cb) {
      if (window.RufflePlayer && window.RufflePlayer.newest) return cb();
      const t = setInterval(() => {
        if (window.RufflePlayer && window.RufflePlayer.newest) {
          clearInterval(t);
          cb();
        }
      }, 50);
      // give up after ~10s
      setTimeout(() => clearInterval(t), 10000);
    }

    window.addEventListener("load", () => {
      whenRuffleReady(() => loadGame(pickRandom()));
    });

    document.getElementById("reroll").addEventListener("click", () => {
      whenRuffleReady(() => loadGame(pickRandom()));
    });
  </script>
</body>
</html>
