<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ilovetoplayflashgame.com</title>

  <style>
    :root {
      --bg:      #cccccc;   /* grey page background */
      --red:     #cc2b2b;   /* red text / accents */
      --border:  #e0726e;   /* light red frame */
      --purple:  #8a2be2;   /* hover / active colour */
      --bubble:  #e8231f;   /* speech-bubble fill */
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      font-family: system-ui, "Segoe UI", -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- stage = white screen + welcome line under it ---- */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* ===================== WHITE SCREEN ===================== */
    .screen {
      position: relative;
      width: min(860px, 92vw);
      height: min(556px, 72vh);
      background: #fff;
      border: 1px solid var(--border);
      overflow: visible;          /* let the speech bubble spill past the left edge */
      cursor: pointer;
    }

    /* top-left "broken image" glyph */
    .broken {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 22px;          /* tweak this to resize the icon */
      height: auto;         /* keeps the image's aspect ratio */
    }

    /* top-centre clickable "logo" text */
    .logo {
      position: absolute;
      top: 16px;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--red);
      font-size: 21px;
      user-select: none;
      transition: color 0.12s ease;
    }
    .logo:hover,
    .logo:active { color: var(--purple); }

    /* welcome line beneath the screen */
    .welcome {
      color: var(--red);
      font-size: 21px;
      user-select: none;
    }

    /* refresh blink: blank the page briefly, like a reload */
    .refreshing .screen,
    .refreshing .welcome { visibility: hidden; }

    /* ===================== MASCOT ===================== */
    .mascot {
      position: absolute;
      left: -45px;            /* centred directly under the speech-bubble tail */
      bottom: 0;
      width: 170px;
      opacity: 0;
      transform: translateY(12px) scale(0.9);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    .mascot.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ===================== SPEECH BUBBLE ===================== */
    .bubble {
      position: absolute;
      left: -95px;
      bottom: 168px;
      width: 205px;
      background: var(--bubble);
      border: 4px solid #000;
      border-radius: 14px;
      padding: 14px 16px;
      color: #111;
      font-size: 16px;
      line-height: 1.25;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .bubble.show { opacity: 1; }

    /* bubble tail (points down toward the mascot) */
    .bubble::before,
    .bubble::after {
      content: "";
      position: absolute;
      bottom: -26px;
      right: 40px;
      width: 0;
      height: 0;
      border-style: solid;
    }
    .bubble::before {              /* black outline of the tail */
      border-width: 28px 26px 0 0;
      border-color: #000 transparent transparent transparent;
    }
    .bubble::after {               /* red fill of the tail */
      bottom: -19px;
      right: 45px;
      border-width: 20px 18px 0 0;
      border-color: var(--bubble) transparent transparent transparent;
    }

    .bubble-text { margin: 0; }
    .bubble-text em { font-style: italic; }

    .archive-link {
      display: none;
      margin-top: 8px;
      color: #111;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.12s ease;
    }
    .archive-link:hover,
    .archive-link:active { color: var(--purple); }
  </style>
</head>

<body>
  <main class="stage">
    <section class="screen" id="screen">
      <!-- broken-image icon -->
      <img class="broken" src="image/broken.png" alt="" />

      <!-- clickable logo -->
      <div class="logo" id="logo">ilovetoplayflashgame.com</div>

      <!-- speech bubble (revealed after the click) -->
      <div class="bubble" id="bubble">
        <p class="bubble-text" id="bubbleText"></p>
        <a class="archive-link" id="archiveLink" href="page/archive.html"></a>
      </div>

      <!-- mascot (revealed after the click) -->
      <img class="mascot" id="mascot" src="image/box_default.png" alt="mascot" />
    </section>

    <div class="welcome">- welcome to ilovetoplayflashgame.com! Click on the logo to start -</div>
  </main>

  <script>
    const screen      = document.getElementById("screen");
    const bubble      = document.getElementById("bubble");
    const mascot      = document.getElementById("mascot");
    const bubbleText  = document.getElementById("bubbleText");
    const archiveLink = document.getElementById("archiveLink");

    // bubble paragraph, split so "around" can be italic mid-sentence
    const PARAGRAPH = [
      { text: "Looks like this flash game website failed to load! However, I could still show you ", italic: false },
      { text: "around", italic: true },
      { text: ".", italic: false },
    ];
    const LINK_TEXT = "🔘Go to the archive";
    const SPEED = 28; // ms per character

    let started = false;

    // type a list of {text, italic} segments into a container, char by char
    function typeSegments(container, segments, speed, done) {
      let si = 0, ci = 0, cur = null;
      (function step() {
        if (si >= segments.length) { if (done) done(); return; }
        const seg = segments[si];
        const chars = [...seg.text];
        if (ci === 0) {
          cur = document.createElement(seg.italic ? "em" : "span");
          container.appendChild(cur);
        }
        if (ci < chars.length) {
          cur.textContent += chars[ci++];
          setTimeout(step, speed);
        } else {
          si++; ci = 0; setTimeout(step, speed);
        }
      })();
    }

    function typeText(el, text, speed, done) {
      typeSegments(el, [{ text: text, italic: false }], speed, done);
    }

    function reveal() {
      mascot.classList.add("show");
      bubble.classList.add("show");
      typeSegments(bubbleText, PARAGRAPH, SPEED, () => {
        archiveLink.style.display = "block";
        typeText(archiveLink, LINK_TEXT, SPEED);
      });
    }

    screen.addEventListener("click", () => {
      if (started) return;          // ignore clicks once the sequence has begun
      started = true;

      // 1) "refresh" blink — blank the page like a reload
      document.body.classList.add("refreshing");
      setTimeout(() => document.body.classList.remove("refreshing"), 320);

      // 2) one second later, bring in the mascot + typed dialogue
      setTimeout(reveal, 1000);
    });
  </script>
</body>
</html>
