    <!-- Content block 1 — expandable essay.

    <article class="essay">
<script type="text/plain" class="stretch-src">
You used to be able to open a browser, click a link, and a little game would just start playing. No buying, no installing, no console — it was already there, <<replace "free, inside the page">>free, inside the page, because you never installed a Flash game; you visited a <<replace "portal">>portal — sites like <a href="https://www.newgrounds.com/" target="_blank">Newgrounds</a>, Miniclip, and Kongregate, each holding thousands of titles in long clickable lists, where a team of two or three could build a game in a few months and put it in front of millions<<endreplace>>. And because each game was just a small, copyable file, it travelled: the same .swf got re-uploaded onto portals all over the world, often without its maker ever knowing, and crossing a border it was usually <<replace "renamed and re-explained">>renamed, re-skinned, and re-explained for a new audience — in China, on portals like <<replace "4399 and 7k7k">>4399 and 7k7k (named after number-homophones of Chinese phrases), many Western games arrived lifted from elsewhere, wrapped in a fresh local preloader and given a little illustrated guide translating which English buttons to press, so the same code quietly became a different object: a new name, a new audience, a new memory<<endreplace>><<endreplace>>, until a single file could be living several parallel lives at once — part of why scholars have called Flash something close to a <<replace "universal language">>universal language of the early interactive web<<endreplace>><<endreplace>>. These were <<replace "Flash games">>Flash games. "Flash" actually meant three things at once: a tool designers drew and animated in, a <<replace "tiny file">>tiny file — a .swf, for "Small Web Format" — that held all the art, sound, and code and could stream down even a dial-up connection<<endreplace>> that the finished game lived inside, and a browser plugin that played it. It drew everything with <<replace "vectors">>vectors, math describing shapes instead of grids of pixels, which kept files tiny and edges crisp at any size — the clean, rubbery look people came to call "Flashimation"<<endreplace>>, and once it gained a scripting language called <<replace "ActionScript">>ActionScript, around 1999, those animations could turn into real interactive games — though its final version, <<replace "ActionScript 3">>ActionScript 3 (2006), is ironically the hardest part of Flash to revive today, so a game's age can quietly decide whether it still runs<<endreplace>><<endreplace>>. The whole thing had started back in <<replace "1996">>1996 as "FutureSplash Animator," made by a tiny company that Macromedia bought and renamed Flash, before Adobe took it over in 2005<<endreplace>>; the name was even borrowed from Macromedia's older player, <<replace "Shockwave">>Shockwave, which hides a quiet life-or-death line: Shockwave games (made in Director, files ending in .dcr) and Flash games (.swf) looked identical to you, but they are completely different formats, and today's emulators can revive .swf while barely touching .dcr<<endreplace>><<endreplace>>. For about ten years they were <<replace "everywhere">>everywhere — for a lot of people, the first videogames they ever played, on a computer that wasn't even theirs<<endreplace>>. And then, almost overnight, nearly all of them <<replace "stopped working">>stopped working. The end came slowly, then all at once: in <<replace "2010">>2010, Apple's Steve Jobs published an open letter, "Thoughts on Flash," refusing to allow it on the iPhone — too insecure, too power-hungry, too "closed" — and Flash left mobile by 2011<<endreplace>>; in 2017 Adobe set an end-of-life date of December 31, 2020 (Shockwave had already been retired that April, in 2019); and on <<replace "January 12, 2021">>January 12, 2021, Flash Player began actively blocking all content — a single calendar date that turned thousands of living games into dead files<<endreplace>><<endreplace>> — unless <<replace "someone had saved them">>someone had saved them. They survive now almost entirely through volunteer effort: the <a href="https://flashpointarchive.org/" target="_blank">Flashpoint Archive</a> bundles over 200,000 original files with a launcher that fools each game into thinking it's still on the live web; the <a href="https://ruffle.rs/" target="_blank">Ruffle</a> emulator, written in Rust and running in any modern browser, replays .swf games — though <<replace "only .swf">>only .swf: Shockwave's .dcr content needs separate, far less complete tools, which is why some games can come back and some simply can't<<endreplace>>; and the <a href="https://archive.org/details/softwarelibrary_flash" target="_blank">Internet Archive</a> hosts thousands online. But <<replace "saving the file isn't the same as saving the game">>saving the file isn't the same as saving the game: an emulator can run the .swf, but it can't restore the portal's homepage, the comment threads underneath, the friends crowded around one school monitor, or the particular name the game had in your language. The code can be preserved; the world around it decays — and that gap, between a file that still runs and an experience that is gone, is where the real history of Flash games now lives<<endreplace>><<endreplace>>.
</script>
