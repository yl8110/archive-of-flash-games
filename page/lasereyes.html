<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unwrapping — lasereyes</title>
  <link rel="stylesheet" href="archive.css" />
</head>

<!-- data-page=collecting-memory keeps "collecting memory" highlighted in the menu -->
<body data-page="collecting-memory">

  <!-- 礼物盒说的话 -->
  <template id="speech">Let's see what people remember about this game.</template>

  <!-- ★★★ 右侧主体内容 ★★★ -->
  <template id="main">

    <!-- ① 游戏名标题(待补充):居中、加粗、红色 -->
    <h1 class="game-title">聖ロマンス学園 恋のトキメキ♪大作戦</h1>

    <!-- ② 两栏:左=封面图,右=信息 -->
    <div class="game-top">
      <div class="game-cover">
        <img src="../image/lasereyes-cover.jpg" alt="聖ロマンス学園 cover" />
      </div>
      <div class="game-meta">
        <p><span class="meta-label">Aliases:</span> romance academy, 电眼美女</p>
        <p><span class="meta-label">Developers:</span> Shockwave Entertainment, Inc.</p>
        <p><span class="meta-label">Nationality:</span> Japanese</p>
        <p><span class="meta-label">Release Year:</span> 2006</p>
      </div>
    </div>

    <!-- ③ Flash 游戏播放器:把 .swf 链接填进 data-swf -->
    <div class="flash-player" data-swf=""></div>

    <!-- ④ Memories 区(左对齐标题) -->
    <h2 class="memories-title">Memories</h2>

    <!-- ⑤ 评论区:直接调用你做好的 game-laser-eyes.html(iframe 自动撑高) -->
    <div class="memory-embed" data-src="game-laser-eyes.html"></div>

  </template>

  <script src="archive.js"></script>
</body>
</html>
