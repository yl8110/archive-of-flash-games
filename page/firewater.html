<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unwrapping — firewater</title>
  <link rel="stylesheet" href="archive.css" />
</head>

<!-- data-page=collecting-memory keeps "collecting memory" highlighted in the menu -->
<body data-page="collecting-memory">

  <!-- 礼物盒说的话 -->
  <template id="speech">Let's see what people remember about this game.</template>

  <!-- ★★★ 右侧主体内容 ★★★ -->
  <template id="main">

    <!-- ① 游戏名标题(待补充):居中、加粗、红色 -->
    <h1 class="game-title">Fireboy and Watergirl in the Forest Temple</h1>

    <!-- ② 两栏:左=封面图,右=信息 -->
    <div class="game-top">
      <div class="game-cover">
        <img src="../image/firewater-cover.jpg" alt="Fireboy and Watergirl cover" />
      </div>
      <div class="game-meta">
        <p><span class="meta-label">Developers:</span> Oslo Albet</p>
        <p><span class="meta-label">Nationality:</span> Norwegian</p>
        <p><span class="meta-label">Release Date:</span> November 19, 2009</p>
      </div>
    </div>

    <!-- ③ Flash 游戏播放器:把 .swf 链接填进 data-swf -->
    <div class="flash-player" data-swf=""></div>

    <!-- ④ Memorys 区(左对齐标题) -->
    <h2 class="memories-title">Memories</h2>

    <!-- ⑤ 评论区:are.na 频道 game-fire-water,原生评论区样式(动态加载) -->
    <div class="arena-feed" data-channel="game-fire-water"></div>

  </template>

  <script src="archive.js"></script>
</body>
</html>
