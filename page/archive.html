<script type="text/plain" class="stretch-src">
Flash games are decayed objects: the technology marked as outdated and left to fail, making the artifacts lose their legibility. After flash service ended in 2020, there have been projects and initiatives dedicated to preserving flash games, through emulators that recreate the environment in which a flash game can run. This flash game archive shifts the focus from the game itself to its <span class="red">afterlives</span>, unwrapping, tracing, and archiving <span class="red">how it gets preserved</span> and <span class="red">how it is remembered</span> through the fragments it contextualizes.
</script>
